<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#1a1a2e">
<title>Parking Gothenburg</title>
<link rel="manifest" href="manifest.json">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" crossorigin="">
<link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.css" crossorigin="">
<link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.Default.css" crossorigin="">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
:root {
  --bg: #1a1a2e;
  --surface: #16213e;
  --surface2: #0f3460;
  --accent: #e94560;
  --green: #00b894;
  --yellow: #fdcb6e;
  --red: #e17055;
  --text: #f0f0f0;
  --text-dim: #a0a0b0;
  --radius: 12px;
}
[data-theme="light"] {
  --bg: #f0f2f5;
  --surface: #ffffff;
  --surface2: #e4e6eb;
  --text: #1c1e21;
  --text-dim: #65676b;
}
[data-theme="light"] .leaflet-popup-content-wrapper { background: #fff !important; color: #1c1e21 !important; }
[data-theme="light"] .leaflet-popup-tip { background: #fff !important; }
[data-theme="light"] .marker-dot { border-color: #333; }
[data-theme="light"] .price-mid { color: #b45309; }
body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
  background: var(--bg);
  color: var(--text);
  height: 100dvh;
  display: flex;
  flex-direction: column;
  overflow: hidden;
}

/* Header */
#header {
  background: var(--surface);
  padding: 8px 12px;
  display: flex;
  align-items: center;
  gap: 8px;
  flex-wrap: wrap;
  border-bottom: 1px solid rgba(255,255,255,0.08);
  z-index: 1000;
  flex-shrink: 0;
}
@media (max-width: 480px) {
  #header { padding: 6px 8px; gap: 6px; }
  #header .author { display: none; }
  #header h1 { font-size: 14px; }
}
#header h1 { font-size: 16px; font-weight: 600; white-space: nowrap; }
#header .author { font-size: 10px; color: var(--text-dim); text-decoration: none; opacity: 0.6; }
#header .author:hover { opacity: 1; }
#header .stats { font-size: 11px; color: var(--text-dim); margin-left: auto; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; min-width: 0; }
.hdr-btn { flex-shrink: 0; background: none; border: 1px solid rgba(255,255,255,0.1); font-size: 14px; cursor: pointer; padding: 3px 7px; border-radius: 8px; line-height: 1; color: var(--text-dim); transition: all 0.15s; }
.hdr-btn:hover { color: var(--text); background: rgba(255,255,255,0.06); }
.hdr-btn:active { transform: scale(0.92); }
.hdr-btn.active { background: var(--surface2); border-color: var(--accent); }
[data-theme="light"] .hdr-btn { border-color: rgba(0,0,0,0.12); }
[data-theme="light"] .hdr-btn:hover { background: rgba(0,0,0,0.04); }

/* Map */
#map {
  flex: 1;
  z-index: 1;
}

/* Bottom panel */
#panel {
  background: var(--surface);
  border-top: 1px solid rgba(255,255,255,0.08);
  max-height: 45dvh;
  display: flex;
  flex-direction: column;
  transition: max-height 0.3s ease;
  z-index: 1000;
  flex-shrink: 0;
}
#panel.collapsed { max-height: 44px; }
#panel-header {
  padding: 10px 12px;
  display: flex;
  align-items: center;
  gap: 8px;
  cursor: pointer;
  flex-shrink: 0;
}
#panel-header .handle {
  width: 36px; height: 4px;
  background: rgba(255,255,255,0.2);
  border-radius: 2px;
  margin: 0 auto;
}

/* Controls row */
#controls {
  padding: 0 12px 8px;
  display: flex;
  gap: 6px;
  flex-wrap: wrap;
  flex-shrink: 0;
}
.btn {
  background: var(--surface2);
  border: 1px solid rgba(255,255,255,0.1);
  color: var(--text);
  padding: 6px 12px;
  border-radius: 20px;
  font-size: 12px;
  cursor: pointer;
  white-space: nowrap;
  transition: all 0.15s;
  -webkit-tap-highlight-color: transparent;
}
.btn:hover { background: rgba(255,255,255,0.12); }
.btn:active { transform: scale(0.95); }
.btn.active { background: var(--accent); border-color: var(--accent); color: #fff; }
.btn.locate { background: var(--green); border-color: var(--green); color: #fff; }
[data-theme="light"] .btn { border-color: rgba(0,0,0,0.1); }
[data-theme="light"] .btn:hover { background: rgba(0,0,0,0.06); }
[data-theme="light"] .btn.active { background: var(--accent); color: #fff; }
[data-theme="light"] .btn.locate { background: var(--green); color: #fff; }
#sort-select {
  background: var(--surface2);
  border: 1px solid rgba(255,255,255,0.1);
  color: var(--text);
  padding: 6px 10px;
  border-radius: 20px;
  font-size: 12px;
  cursor: pointer;
}
[data-theme="light"] #sort-select { border-color: rgba(0,0,0,0.1); }

/* Results list */
#results {
  overflow-y: auto;
  padding: 0 12px 12px;
  -webkit-overflow-scrolling: touch;
}
.result-card {
  background: var(--bg);
  border-radius: var(--radius);
  padding: 10px 12px;
  margin-bottom: 6px;
  display: flex;
  align-items: center;
  gap: 10px;
  cursor: pointer;
  transition: background 0.15s;
  -webkit-tap-highlight-color: transparent;
}
.result-card:hover { background: var(--surface2); }
.result-card:active { background: var(--surface2); transform: scale(0.99); }
.result-card .price-badge {
  min-width: 52px;
  text-align: center;
  padding: 4px 8px;
  border-radius: 8px;
  font-weight: 700;
  font-size: 14px;
  flex-shrink: 0;
}
.price-cheap { background: rgba(0,184,148,0.2); color: var(--green); }
.price-mid { background: rgba(253,203,110,0.2); color: var(--yellow); }
.price-high { background: rgba(225,112,85,0.2); color: var(--red); }
.price-unknown { background: rgba(160,160,176,0.15); color: var(--text-dim); }
.result-card .info { flex: 1; min-width: 0; }
.result-card .name { font-size: 13px; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.result-card .meta { font-size: 11px; color: var(--text-dim); margin-top: 2px; }
.result-card .distance { font-size: 12px; color: var(--text-dim); white-space: nowrap; flex-shrink: 0; }
.source-dot {
  display: inline-block; width: 6px; height: 6px;
  border-radius: 50%; margin-right: 4px; vertical-align: middle;
}
.src-easypark { background: #ec5fa1; }
.src-parkster { background: #4daa5b; }
.src-parkering_gbg { background: #387aba; }

/* Source logo badges */
.src-logo {
  display: inline-block;
  font-size: 10px;
  font-weight: 700;
  padding: 1px 5px;
  border-radius: 4px;
  vertical-align: middle;
  letter-spacing: 0.3px;
  line-height: 14px;
}
.src-logo-easypark { background: #ec5fa1; color: #fff; }
.src-logo-parkster { background: #4daa5b; color: #fff; }
.src-logo-parkering_gbg { background: #387aba; color: #fff; }
.src-logo-epark { background: #00a89e; color: #fff; }

/* Autocomplete dropdown */
#autocomplete {
  position: absolute;
  background: var(--surface);
  border: 1px solid rgba(255,255,255,0.15);
  border-radius: 12px;
  max-height: 200px;
  overflow-y: auto;
  z-index: 2000;
  display: none;
  box-shadow: 0 4px 16px rgba(0,0,0,0.4);
  width: 260px;
}
#autocomplete.visible { display: block; }
.ac-item {
  padding: 8px 12px;
  cursor: pointer;
  font-size: 12px;
  border-bottom: 1px solid rgba(255,255,255,0.05);
}
.ac-item:hover, .ac-item:active { background: var(--surface2); }
.ac-item .ac-name { font-weight: 500; }
.ac-item .ac-sub { font-size: 10px; color: var(--text-dim); }

/* Google Maps link input */
#location-input {
  background: var(--bg);
  border: 1px solid rgba(255,255,255,0.1);
  color: var(--text);
  padding: 6px 10px;
  border-radius: 20px;
  font-size: 12px;
  width: 100%;
  max-width: 220px;
}
#location-input::placeholder { color: var(--text-dim); }

/* Loading overlay */
#loading {
  position: fixed; inset: 0;
  background: var(--bg);
  display: flex;
  align-items: center;
  justify-content: center;
  flex-direction: column;
  gap: 16px;
  z-index: 9999;
  transition: opacity 0.3s;
}
#loading.hidden { opacity: 0; pointer-events: none; }
.spinner {
  width: 40px; height: 40px;
  border: 3px solid rgba(255,255,255,0.1);
  border-top-color: var(--accent);
  border-radius: 50%;
  animation: spin 0.8s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }

/* Custom markers */
.price-marker {
  background: none;
  border: none;
}
.marker-dot {
  width: 12px; height: 12px;
  border-radius: 50%;
  border: 2px solid white;
  box-shadow: 0 1px 4px rgba(0,0,0,0.4);
}

/* Leaflet popup override */
.leaflet-popup-content-wrapper {
  background: var(--surface) !important;
  color: var(--text) !important;
  border-radius: var(--radius) !important;
  box-shadow: 0 4px 20px rgba(0,0,0,0.4) !important;
}
.leaflet-popup-tip { background: var(--surface) !important; }
.leaflet-popup-content { margin: 10px 14px !important; font-size: 13px; }
.leaflet-popup-content .popup-name { font-weight: 600; font-size: 14px; margin-bottom: 4px; }
.leaflet-popup-content .popup-price { color: var(--green); font-weight: 700; font-size: 16px; }
.leaflet-popup-content .popup-meta { color: var(--text-dim); font-size: 11px; margin-top: 6px; line-height: 1.5; }
.leaflet-popup-content a { color: var(--accent); }

/* Popup code rows */
.popup-codes { margin: 6px 0; display: flex; flex-direction: column; gap: 4px; }
.code-row { display: flex; align-items: center; gap: 4px; flex-wrap: wrap; }
.code-row .src-logo { flex-shrink: 0; }
.code-num { font-family: 'SF Mono', 'Menlo', monospace; font-size: 14px; font-weight: 700; color: var(--text); letter-spacing: 1px; }
.popup-pill {
  display: inline-flex; align-items: center; gap: 3px;
  background: var(--surface2); border: 1px solid rgba(255,255,255,0.12);
  color: var(--text); padding: 3px 8px; border-radius: 10px;
  font-size: 11px; cursor: pointer; white-space: nowrap;
  text-decoration: none; line-height: 1.2; transition: background 0.15s;
}
.popup-pill:hover { background: var(--accent); border-color: var(--accent); color: #fff; }
.popup-pill:active { transform: scale(0.95); }
[data-theme="light"] .popup-pill { border-color: rgba(0,0,0,0.12); }
[data-theme="light"] .popup-pill:hover { background: var(--accent); color: #fff; }

/* Type badges — all outlined */
.type-badge {
  display: inline-block; font-size: 10px; font-weight: 600; padding: 1px 6px;
  border-radius: 6px; letter-spacing: 0.3px; vertical-align: middle;
  background: transparent; border: 1.5px solid;
}
.type-badge.type-street { color: #2563eb; border-color: #2563eb; }
.type-badge.type-lot    { color: #b45309; border-color: #b45309; }
.type-badge.type-garage { color: #7c3aed; border-color: #7c3aed; }
.type-badge.type-ev     { color: #059669; border-color: #059669; }
.type-badge.type-other  { color: #4b5563; border-color: #4b5563; }
[data-theme="dark"] .type-badge.type-street { color: #60a5fa; border-color: #60a5fa; }
[data-theme="dark"] .type-badge.type-lot    { color: #f59e0b; border-color: #f59e0b; }
[data-theme="dark"] .type-badge.type-garage { color: #a78bfa; border-color: #a78bfa; }
[data-theme="dark"] .type-badge.type-ev     { color: #34d399; border-color: #34d399; }
[data-theme="dark"] .type-badge.type-other  { color: #9ca3af; border-color: #9ca3af; }

/* Seasonal badge */
.seasonal-badge {
  display: inline-block; font-size: 9px; font-weight: 600; padding: 1px 5px;
  border-radius: 6px; letter-spacing: 0.3px; vertical-align: middle;
  background: transparent; border: 1.5px solid;
  margin-left: 4px;
}
.seasonal-badge.season-active { color: #d97706; border-color: #d97706; }
.seasonal-badge.season-inactive { color: #6b7280; border-color: #6b7280; }
[data-theme="dark"] .seasonal-badge.season-active { color: #fbbf24; border-color: #fbbf24; }
[data-theme="dark"] .seasonal-badge.season-inactive { color: #9ca3af; border-color: #9ca3af; }

/* Popup actions row */
.popup-actions { display: flex; gap: 6px; margin-top: 8px; flex-wrap: wrap; }
.popup-actions .popup-pill { font-size: 12px; padding: 5px 10px; }

/* Cluster override */
.marker-cluster-small, .marker-cluster-medium, .marker-cluster-large {
  background: rgba(233,69,96,0.3) !important;
}
.marker-cluster-small div, .marker-cluster-medium div, .marker-cluster-large div {
  background: var(--accent) !important;
  color: white !important;
  font-weight: 600;
}

/* Radius slider row */
#radius-row {
  padding: 0 12px 6px;
  display: flex;
  align-items: center;
  gap: 8px;
  font-size: 11px;
  color: var(--text-dim);
  flex-shrink: 0;
}
#radius-slider {
  flex: 1;
  accent-color: var(--accent);
  height: 4px;
}
#radius-label { min-width: 44px; text-align: right; font-weight: 600; color: var(--text); }

/* Drop pin marker */
.pin-marker {
  font-size: 28px;
  line-height: 1;
  text-shadow: 0 2px 6px rgba(0,0,0,0.5);
  cursor: grab;
}

/* Radius circle */
.radius-circle {
  stroke: var(--accent);
  fill: var(--accent);
}

@media (min-width: 768px) {
  #panel { max-height: 35dvh; }
  #location-input { max-width: 300px; }
}
</style>
</head>
<body>

<div id="loading">
  <div class="spinner"></div>
  <div>Loading parking data...</div>
</div>

<div id="header">
  <h1>🅿️ Parking GBG</h1>
  <a class="author" href="https://github.com/abhineetst18" target="_blank" rel="noopener">by Abhineet</a>
  <span id="stats" class="stats"></span>
  <button id="lang-btn" class="hdr-btn" title="Toggle language">🇸🇪</button>
  <button id="theme-btn" class="hdr-btn" title="Toggle light/dark mode">☀️</button>
  <button id="satellite-btn" class="hdr-btn" title="Toggle satellite view">🛰️</button>
</div>

<div id="map"></div>

<div id="panel">
  <div id="panel-header"><div class="handle"></div></div>
  <div id="controls">
    <button class="btn locate" onclick="locateMe()">📍 My Location</button>
    <div style="position:relative">
      <input id="location-input" type="text" placeholder="Search address or place..." autocomplete="off">
      <div id="autocomplete"></div>
    </div>
    <select id="sort-select">
      <option value="distance">Nearest</option>
      <option value="price">Cheapest</option>
    </select>
    <button class="btn" onclick="enableDropPin()" title="Drop a pin on the map">📌 Drop Pin</button>
    <button class="btn filter-btn" data-source="all" onclick="toggleSource(this)">All</button>
    <button class="btn filter-btn active" data-source="easypark" onclick="toggleSource(this)">EP</button>
    <button class="btn filter-btn active" data-source="parkster" onclick="toggleSource(this)">Parkster</button>
    <button class="btn filter-btn active" data-source="parkering_gbg" onclick="toggleSource(this)">GBG</button>
    <button class="btn filter-btn active" data-source="epark" onclick="toggleSource(this)">ePARK</button>
    <button class="btn filter-btn active" data-type="street" onclick="toggleType(this)">🛣️ Street</button>
    <button class="btn filter-btn active" data-type="garage" onclick="toggleType(this)">🏢 Garage</button>
    <button class="btn filter-btn active" data-type="lot" onclick="toggleType(this)">🅿️ Lot</button>
    <button class="btn filter-btn" data-type="ev" onclick="toggleType(this)">⚡ EV</button>
    <button class="btn filter-btn active" data-type="other" onclick="toggleType(this)">Other</button>
    <button class="btn filter-btn" id="hide-free-btn" onclick="toggleHideFree(this)">🚫 Free</button>
  </div>
  <div id="radius-row">
    <span>Radius:</span>
    <input id="radius-slider" type="range" min="200" max="10000" step="100" value="3000">
    <span id="radius-label">3.0 km</span>
  </div>
  <div id="results"></div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" crossorigin=""></script>
<script src="https://unpkg.com/leaflet.markercluster@1.5.3/dist/leaflet.markercluster.js" crossorigin=""></script>
<script>
'use strict';

// ── State ──
let allSpots = [];
let userLat = null, userLon = null;
let map, userMarker, clusterGroup;
let activeSources = new Set(['easypark', 'parkster', 'parkering_gbg', 'epark']);
let activeTypes = new Set(['street', 'garage', 'lot', 'other']);
let hideFree = false;
let sortMode = 'distance';
let searchRadius = 3000; // metres, adjustable
let lang = 'sv'; // 'sv' or 'en'

// ── Platform detection ──
const _isIOS = /iPad|iPhone|iPod/.test(navigator.userAgent);
const _isAndroid = /Android/.test(navigator.userAgent);
const _isMobile = _isIOS || _isAndroid;

// ── Swedish → English translation ──
const SV_EN = [
  // Time expressions (order matters - longer patterns first)
  [/\balla dagar\b/gi, 'all days'],
  [/\bhelgfri\b/gi, 'non-holiday'],
  [/\bmånd?-fred?\b/gi, 'Mon-Fri'],
  [/\blör-sön\b/gi, 'Sat-Sun'],
  [/\bmån\b/gi, 'Mon'], [/\btis\b/gi, 'Tue'], [/\bons\b/gi, 'Wed'],
  [/\btor\b/gi, 'Thu'], [/\bfre\b/gi, 'Fri'], [/\blör\b/gi, 'Sat'], [/\bsön\b/gi, 'Sun'],
  [/\bmåndagar\b/gi, 'Mondays'], [/\btisdagar\b/gi, 'Tuesdays'],
  [/\bonsdagar\b/gi, 'Wednesdays'], [/\btorsdagar\b/gi, 'Thursdays'],
  [/\bfredagar\b/gi, 'Fridays'], [/\blördagar\b/gi, 'Saturdays'],
  [/\bsöndagar\b/gi, 'Sundays'],
  [/\bklockan\b/gi, ''],
  [/\bövrig tid\b/gi, 'other times'],
  // Pricing
  [/\bkr\/tim\b/gi, 'SEK/hr'], [/\bkr\/timme\b/gi, 'SEK/hr'], [/\bkr\/h\b/gi, 'SEK/hr'],
  [/\bkr\/dygn\b/gi, 'SEK/24h'], [/\bkr\/dag\b/gi, 'SEK/day'],
  [/\bkr\s+per\s+påbörjad\w*\s+timme\b/gi, 'SEK/started hr'],
  [/\bkr\s*\/?\s*per\s+påbörjad\w*\b/gi, 'SEK/started'],
  [/\bmaxtaxa\b/gi, 'max rate'],
  [/\bgratis\b/gi, 'Free'],
  [/\bavgiftsfri\b/gi, 'free of charge'],
  // Parking terms
  [/\bP-förbud\b/gi, 'No parking'],
  [/\bp-tillstånd\s+erfordras\b/gi, 'permit required'],
  [/\btillstånd\b/gi, 'permit'],
  [/\bpåbörjad\w*\b/gi, 'started'],
  [/\btidsbegräns\w*/gi, 'time-limited'],
  [/\bserviceavgift\s+kan\s+tillkomma\b/gi, 'service fee may apply'],
  [/\bladdplats\b/gi, 'charging station'],
  [/\blåst\s+garage\b/gi, 'locked garage'],
  [/\bendast\s+för\b/gi, 'only for'],
  [/\bhyresgäst\w*\b/gi, 'tenants'],
  [/\bboende\b/gi, 'residents'],
  [/\banställd\w*\b/gi, 'employees'],
  // Phrase patterns (longest first)
  [/\bper påbörjad timme\b/gi, 'per started hour'],
  [/\bdygnet runt\b/gi, '24/7'],
  [/\bse skyltning på plats\b/gi, 'see signage on site'],
  [/\bkontrollera skyltning\b/gi, 'check signage'],
  [/\bej avslutad session\b/gi, 'unfinished session'],
  [/\bstarta parkering\b/gi, 'start parking'],
  [/\bmaxhöjd (\d)/gi, 'max height $1'],
  // Calendar/Time
  [/\bhelgfria vardagar\b/gi, 'non-holiday weekdays'],
  [/\bvardagar\b/gi, 'weekdays'],
  [/\bhelgdagar\b/gi, 'public holidays'],
  [/\bhelg\b/gi, 'weekend/holiday'],
  [/\bdagtid\b/gi, 'daytime'],
  [/\bkvällstid\b/gi, 'evening'],
  [/\bkväll\b/gi, 'evening'],
  [/\bnatt\b/gi, 'night'],
  [/\bdagar\b/gi, 'days'],
  [/\bdag\b/gi, 'day'],
  [/\bveckor\b/gi, 'weeks'],
  [/\bmånad\b/gi, 'month'],
  [/\befter\b/gi, 'after'],
  [/\bföre\b/gi, 'before'],
  [/\bmellan\b/gi, 'between'],
  [/\bunder\b/gi, 'during'],
  [/\bfrån\b/gi, 'from'],
  [/\btill\b/gi, 'to'],
  [/\bsamt\b/gi, 'and also'],
  [/\boch\b/gi, 'and'],
  [/\beller\b/gi, 'or'],
  [/\bjämna\b/gi, 'even'],
  [/\budda\b/gi, 'odd'],
  // Parking/Access (longest first)
  [/\bavgiftsfritt\b/gi, 'free of charge'],
  [/\bavgiftsparkering\b/gi, 'paid parking'],
  [/\bparkeringsavgift\b/gi, 'parking fee'],
  [/\bparkeringstid\b/gi, 'parking time'],
  [/\bparkeringstillstånd\b/gi, 'parking permit'],
  [/\bparkeringen\b/gi, 'the parking'],

  if (!text || lang === 'sv') return text;
  let t = text;
  for (const [pattern, replacement] of SV_EN) {
    t = t.replace(pattern, replacement);
  }
  // Clean up double spaces
  return t.replace(/\s{2,}/g, ' ').trim();
}

// ── Price color logic ──
function priceColor(price) {
  if (price == null) return '#a0a0b0';
  if (price <= 10) return '#00b894';
  if (price <= 20) return '#fdcb6e';
  return '#e17055';
}
function priceClass(price) {
  if (price == null) return 'price-unknown';
  if (price <= 10) return 'price-cheap';
  if (price <= 20) return 'price-mid';
  return 'price-high';
}

const SRC_LABELS = {
  easypark: 'EasyPark',
  parkster: 'Parkster',
  parkering_gbg: 'P.GBG',
  epark: 'ePARK',
};
function srcLogo(source) {
  const label = SRC_LABELS[source] || source;
  return `<span class=\"src-logo src-logo-${source}\">${label}</span>`;
}

const TYPE_ICONS = { street: '🛣️', lot: '🅿️', garage: '🏢', ev: '⚡', other: '📍' };
const TYPE_LABELS = { street: 'Street Parking', lot: 'Parking Lot', garage: 'Garage', ev: 'EV', other: 'Other' };
function typeBadge(type) {
  const icon = TYPE_ICONS[type] || '';
  const label = TYPE_LABELS[type] || type.charAt(0).toUpperCase() + type.slice(1);
  return `<span class="type-badge type-${type}">${icon} ${label}</span>`;
}

function seasonalBadge(spot) {
  if (!spot.season_start || !spot.season_end) return '';
  const now = new Date();
  const mm = String(now.getMonth() + 1).padStart(2, '0');
  const dd = String(now.getDate()).padStart(2, '0');
  const today = `${mm}-${dd}`;
  const active = today >= spot.season_start && today <= spot.season_end;
  const cls = active ? 'season-active' : 'season-inactive';
  const icon = active ? '☀️' : '❄️';
  const startParts = spot.season_start.split('-');
  const endParts = spot.season_end.split('-');
  const label = `${icon} ${parseInt(startParts[1])}/${parseInt(startParts[0])}-${parseInt(endParts[1])}/${parseInt(endParts[0])}`;
  return `<span class="seasonal-badge ${cls}">${label}</span>`;
}

// ── Haversine ──
function haversine(lat1, lon1, lat2, lon2) {
  const R = 6371000;
  const dLat = (lat2 - lat1) * Math.PI / 180;
  const dLon = (lon2 - lon1) * Math.PI / 180;
  const a = Math.sin(dLat/2)**2 + Math.cos(lat1*Math.PI/180) * Math.cos(lat2*Math.PI/180) * Math.sin(dLon/2)**2;
  return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
}

function formatDist(m) {
  if (m < 1000) return `${Math.round(m)} m`;
  return `${(m/1000).toFixed(1)} km`;
}

// ── Create marker ──
function makeMarker(spot) {
  const color = priceColor(spot.price_sek_hr);
  const icon = L.divIcon({
    className: 'price-marker',
    html: `<div class="marker-dot" style="background:${color}"></div>`,
    iconSize: [12, 12],
    iconAnchor: [6, 6],
  });
  const marker = L.marker([spot.lat, spot.lon], { icon });

  let priceStr;
  if (spot.price_sek_hr != null) {
    priceStr = `${spot.price_sek_hr} SEK/hr`;
  } else if (spot.time_limited_free) {
    priceStr = '🆓 Time-limited free';
  } else if (spot.price_text?.includes('Gratis')) {
    priceStr = 'Free';
  } else {
    priceStr = 'Price unknown';
  }
  const limitStr = spot.time_limit ? `<br>⏱ Max ${spot.time_limit}` : (spot.time_limited_free ? '<br>⏱ Check sign for time limit' : '');
  const maxDailyStr = spot.max_daily_sek ? ` · Max ${spot.max_daily_sek} SEK/day` : '';
  const distStr = spot._dist != null ? `<br>${formatDist(spot._dist)} away` : '';
  const navUrl = `https://www.google.com/maps/dir/?api=1&destination=${spot.lat},${spot.lon}&travelmode=walking`;
  const svUrl = `https://www.google.com/maps/@?api=1&map_action=pano&viewpoint=${spot.lat},${spot.lon}`;
  const codes = spot.area_codes || {};
  let codeHtml = '';
  const codeEntries = Object.entries(codes);
  if (codeEntries.length) {
    codeHtml = `<div class="popup-codes">`;
    for (const [src, code] of codeEntries) {
      const logo = srcLogo(src);
      const appBtn = _buildAppBtn(src, code);
      codeHtml += `<div class="code-row">${logo} <span class="code-num">${escHtml(code)}</span> <button class="popup-pill" onclick="copyCode('${escHtml(code)}',this)">📋</button>${appBtn}</div>`;
    }
    codeHtml += `</div>`;
  }

  // Type + sources summary (only if no codes show the sources already)
  const uncodedSrcs = (spot.sources || []).filter(s => !codes[s]);
  const srcSummary = uncodedSrcs.map(srcLogo).join(' ');

  marker.bindPopup(`
    <div class="popup-name">${escHtml(spot.name)}</div>
    <div class="popup-price">${priceStr}${maxDailyStr}</div>
    ${codeHtml}
    <div class="popup-meta">
      ${srcSummary} ${typeBadge(spot.type)}${seasonalBadge(spot)}${limitStr}<br>
      ${escHtml(translateSv(spot.price_text))}${distStr}
    </div>
    <div class="popup-actions">
      <a class="popup-pill" href="${navUrl}" target="_blank" rel="noopener">🚶 Navigate</a>
      <a class="popup-pill" href="${svUrl}" target="_blank" rel="noopener">👁️ Street View</a>
    </div>
  `, { maxWidth: 280 });

  marker._spotId = spot.id;
  return marker;
}

function copyCode(code, btn) {
  navigator.clipboard.writeText(code).then(() => {
    if (btn) { const orig = btn.innerHTML; btn.textContent = '✓'; setTimeout(() => btn.innerHTML = orig, 1200); }
  }).catch(() => {
    const ta = document.createElement('textarea');
    ta.value = code; ta.style.position = 'fixed'; ta.style.opacity = '0';
    document.body.appendChild(ta); ta.select(); document.execCommand('copy');
    document.body.removeChild(ta);
    if (btn) { const orig = btn.innerHTML; btn.textContent = '✓'; setTimeout(() => btn.innerHTML = orig, 1200); }
  });
}

function _buildAppBtn(src, code) {
  if (src === 'easypark') {
    if (_isMobile) return ` <a class="popup-pill" href="easypark://area/${code}">▶ Open</a>`;
    return '';
  }
  if (src === 'parkster') {

    return '';
  }
  if (src === 'parkering_gbg') {
    const url = _isIOS
      ? 'https://apps.apple.com/se/app/parkering-g%C3%B6teborg/id1184264972'
      : _isAndroid ? 'https://play.google.com/store/apps/details?id=se.goteborg.pbolaget.android' : '';
    if (url) return ` <a class="popup-pill" href="${url}" target="_blank" rel="noopener">▶ Open</a>`;

  if (src === 'epark') {

// ── Refresh map + list ──
function refreshMap() {
  const filtered = allSpots.filter(s =>
    (s.sources || []).some(src => activeSources.has(src)) && activeTypes.has(s.type)
    && (!hideFree || s.price_sek_hr !== 0)
  );

  // Compute distances
  if (userLat != null) {
    filtered.forEach(s => {
      s._dist = haversine(userLat, userLon, s.lat, s.lon);
    });
  } else {
    filtered.forEach(s => { s._dist = null; });
  }

  // Filter by radius when user location is set
  let inRadius = filtered;
  if (userLat != null) {
    inRadius = filtered.filter(s => s._dist != null && s._dist <= searchRadius);
  }

  let sorted;
  if (sortMode === 'price') {
    sorted = [...inRadius].sort((a, b) => {
      const pa = a.price_sek_hr ?? 99999;
      const pb = b.price_sek_hr ?? 99999;
      if (pa !== pb) return pa - pb;
      return (a._dist ?? 99999) - (b._dist ?? 99999);
    });
  } else {
    if (userLat != null) {
      sorted = [...inRadius].sort((a, b) => (a._dist ?? 99999) - (b._dist ?? 99999));
    } else {
      sorted = [...filtered].sort((a, b) => (a.price_sek_hr ?? 99999) - (b.price_sek_hr ?? 99999));
    }
  }

  // Update map markers
  clusterGroup.clearLayers();
  const markers = sorted.slice(0, 2000).map(makeMarker);
  clusterGroup.addLayers(markers);

  // Update results list (top 100)
  const resultsEl = document.getElementById('results');
  const top = sorted.slice(0, 100);
  resultsEl.innerHTML = top.map(s => {
    let priceStr;
    if (s.price_sek_hr != null) { priceStr = `${s.price_sek_hr}`; }
    else if (s.time_limited_free) { priceStr = '🆓'; }
    else if (s.price_text?.includes('Gratis')) { priceStr = 'Free'; }
    else { priceStr = '?'; }
    const priceUnit = s.time_limited_free ? '<span style="font-size:9px;font-weight:400">free</span>' : '<span style="font-size:9px;font-weight:400">kr/h</span>';
    const distStr = s._dist != null ? formatDist(s._dist) : '';
    let limitBadge = s.time_limit ? `<span style="color:var(--yellow);font-size:10px"> ⏱${s.time_limit}</span>` : '';
    if (!limitBadge && s.time_limited_free) limitBadge = '<span style="color:var(--yellow);font-size:10px"> ⏱ check sign</span>';
    const codes = s.area_codes || {};
    const firstCode = Object.values(codes)[0] || '';
    const codeBadge = firstCode ? `<span style="color:var(--text-dim);font-size:10px;font-family:monospace"> #${escHtml(firstCode)}</span>` : '';
    const srcLogos = (s.sources || []).map(srcLogo).join(' ');
    return `
      <div class="result-card" onclick="flyTo(${s.lat},${s.lon},'${s.id}')">
        <div class="price-badge ${priceClass(s.price_sek_hr)}">${priceStr}<br>${priceUnit}</div>

}

// ── Google Maps link parser ──
function parseGoogleMapsUrl(text) {
  // Formats: @57.7089,11.9746 or ?q=57.7089,11.9746 or /place/57.7089,11.9746
  let m = text.match(/@(-?\d+\.\d+),(-?\d+\.\d+)/);
  if (m) return [parseFloat(m[1]), parseFloat(m[2])];
  m = text.match(/[?&]q=(-?\d+\.\d+),(-?\d+\.\d+)/);
  if (m) return [parseFloat(m[1]), parseFloat(m[2])];
  m = text.match(/place\/(-?\d+\.\d+),(-?\d+\.\d+)/);
  if (m) return [parseFloat(m[1]), parseFloat(m[2])];
  // Short link resolves, try plain coords
  m = text.match(/(-?\d+\.\d{3,}),\s*(-?\d+\.\d{3,})/);
  if (m) return [parseFloat(m[1]), parseFloat(m[2])];
  return null;
}

// ── Geocoding (Photon primary, Nominatim fallback) ──
async function _photonSearch(query, limit = 1) {
  const url = `https://photon.komoot.io/api/?q=${encodeURIComponent(query)}&lat=57.7&lon=12.0&limit=${limit}&lang=en`;
  const resp = await fetch(url);
  if (!resp.ok) return [];
  const data = await resp.json();
  return (data.features || []).map(f => ({
    lat: f.geometry.coordinates[1],
    lon: f.geometry.coordinates[0],
    display_name: [f.properties.name, f.properties.street, f.properties.city, f.properties.country].filter(Boolean).join(', '),
    name: f.properties.name || f.properties.street || ''
  }));
}

async function _nominatimSearch(query, bounded = true) {
  const bbox = bounded ? '&viewbox=11.7,57.6,12.2,57.85&bounded=1' : '';
  const q = bounded ? query : query + ', Gothenburg';
  const url = `https://nominatim.openstreetmap.org/search?format=json&q=${encodeURIComponent(q)}${bbox}&limit=5&addressdetails=1`;
  const resp = await fetch(url, { headers: { 'Accept-Language': 'en' } });
  if (!resp.ok) return [];
  return resp.json();
}

async function geocodeAddress(query) {
  const input = document.getElementById('location-input');
  input.style.borderColor = 'var(--yellow)';
  input.placeholder = 'Searching...';
  try {
    // Try Photon first (no rate limit)
    let results = await _photonSearch(query, 1);
    if (results.length > 0) {
      setUserLocation(results[0].lat, results[0].lon);
      input.value = '';
      input.blur();
      return true;
    }
    // Fallback: Nominatim bounded
    let nomResults = await _nominatimSearch(query, true);
    if (nomResults.length > 0) {
      setUserLocation(parseFloat(nomResults[0].lat), parseFloat(nomResults[0].lon));
      input.value = '';
      input.blur();
      return true;
    }
    // Fallback: Nominatim unbounded
    nomResults = await _nominatimSearch(query, false);
    if (nomResults.length > 0) {
      setUserLocation(parseFloat(nomResults[0].lat), parseFloat(nomResults[0].lon));
      input.value = '';
      input.blur();
      return true;
    }
    return false;
  } catch (e) {
    console.error('Geocoding failed:', e);
    return false;
  } finally {
    input.style.borderColor = '';
    input.placeholder = 'Search address or place...';
  }
}

function hideAutocomplete() { acEl.classList.remove('visible'); acEl.innerHTML = ''; }

async function fetchSuggestions(q) {
  // Photon primary (no rate limit), Nominatim fallback
  try {
    const results = await _photonSearch(q, 5);
    if (results.length > 0) return results;
  } catch {}
  // Fallback to Nominatim
  try {
    const nomResults = await _nominatimSearch(q, false);
    return nomResults.map(r => ({
      lat: parseFloat(r.lat),
      lon: parseFloat(r.lon),
      display_name: r.display_name,
      name: r.display_name.split(',')[0].trim()
    }));
  } catch { return []; }
}

function showSuggestions(results) {
  if (!results.length) { hideAutocomplete(); return; }
  acEl.innerHTML = results.map((r, i) => {
    const parts = r.display_name.split(',');
    const name = parts[0].trim();
    const sub = parts.slice(1, 3).map(s => s.trim()).join(', ');
    return `<div class="ac-item" data-idx="${i}"><div class="ac-name">${escHtml(name)}</div><div class="ac-sub">${escHtml(sub)}</div></div>`;
  }).join('');
  acEl.classList.add('visible');
  acEl.querySelectorAll('.ac-item').forEach((el, i) => {
    el.addEventListener('click', () => {
      const r = results[i];
      setUserLocation(r.lat, r.lon);
      document.getElementById('location-input').value = r.name || r.display_name.split(',')[0].trim();
      hideAutocomplete();
    });
  });
}

document.getElementById('location-input').addEventListener('input', e => {
  const val = e.target.value.trim();
  clearTimeout(acTimer);
  if (val.length < 3) { hideAutocomplete(); return; }
  // Don't autocomplete coords or URLs
  if (/^\d+\.\d+/.test(val) || /^https?:\/\//.test(val)) { hideAutocomplete(); return; }
  acTimer = setTimeout(async () => {
    try {
      const results = await fetchSuggestions(val);
      showSuggestions(results);
    } catch { hideAutocomplete(); }
  }, 350);
});

// Hide on blur (small delay so click events fire first)
document.getElementById('location-input').addEventListener('blur', () => {
  setTimeout(hideAutocomplete, 200);
});

function isShortGoogleLink(text) {
  return /^https?:\/\/(maps\.app\.goo\.gl|goo\.gl)\//i.test(text.trim());
}

document.getElementById('location-input').addEventListener('keydown', async e => {
  if (e.key === 'Enter') {
    hideAutocomplete();
    const val = e.target.value.trim();
    if (!val) return;

    // 1. Try parsing as coords / Google Maps URL
    const coords = parseGoogleMapsUrl(val);
    if (coords) {
      setUserLocation(coords[0], coords[1]);
      e.target.value = '';
      e.target.blur();
      return;
    }

    // 2. Short Google links can't be resolved client-side
    if (isShortGoogleLink(val)) {
      alert('Short Google Maps links (goo.gl) cannot be resolved in the browser.\n\nInstead:\n1. Open the link in Google Maps\n2. Copy the full URL (with @lat,lng)\n3. Or just type the place name here');
      return;
    }

    // 3. Try geocoding as address/place name
    const found = await geocodeAddress(val);
    if (!found) {
      e.target.style.borderColor = 'var(--red)';
      setTimeout(() => e.target.style.borderColor = '', 1500);
    }
  }
});

// ── Filters ──
function toggleSource(btn) {
  const src = btn.dataset.source;
  if (src === 'all') {
    const allActive = activeSources.size >= 4;
    document.querySelectorAll('.filter-btn[data-source]').forEach(b => {
      if (b.dataset.source !== 'all') {
        b.classList.toggle('active', !allActive);
        if (allActive) activeSources.delete(b.dataset.source);
        else activeSources.add(b.dataset.source);
      }
    });
  } else {
    btn.classList.toggle('active');
    if (btn.classList.contains('active')) activeSources.add(src);
    else activeSources.delete(src);
  }
  refreshMap();
}

function toggleType(btn) {
  const type = btn.dataset.type;
  btn.classList.toggle('active');
  if (btn.classList.contains('active')) activeTypes.add(type);
  else activeTypes.delete(type);
  refreshMap();
}

function toggleHideFree(btn) {
  hideFree = !hideFree;
  btn.classList.toggle('active', hideFree);
  refreshMap();
}

document.getElementById('sort-select').addEventListener('change', e => {
  sortMode = e.target.value;
  updateRadiusCircle();
  refreshMap();
});

// ── Radius slider ──
let _radiusTimer = null;
document.getElementById('radius-slider').addEventListener('input', e => {
  searchRadius = parseInt(e.target.value);
  const label = searchRadius >= 1000 ? `${(searchRadius/1000).toFixed(1)} km` : `${searchRadius} m`;
  document.getElementById('radius-label').textContent = label;
  updateRadiusCircle();
  clearTimeout(_radiusTimer);
  _radiusTimer = setTimeout(refreshMap, 80);
});

function updateRadiusCircle() {
  if (radiusCircle) { map.removeLayer(radiusCircle); radiusCircle = null; }
  if (userLat != null) {
    radiusCircle = L.circle([userLat, userLon], {
      radius: searchRadius,
      color: '#e94560',
      fillColor: '#e94560',
      fillOpacity: 0.06,
      weight: 1,
      dashArray: '6,4',
    }).addTo(map);
  }
}

// ── Language toggle ──
const langBtn = document.getElementById('lang-btn');
langBtn.addEventListener('click', () => {
  lang = lang === 'sv' ? 'en' : 'sv';
  langBtn.textContent = lang === 'sv' ? '🇸🇪' : '🇬🇧';
  refreshMap();
});

// ── Theme toggle (dark / light) ──
const themeBtn = document.getElementById('theme-btn');
function applyMapLayer() {
  map.removeLayer(activeLayer);
  if (isSatellite) {
    activeLayer = satelliteLayer;
  } else {
    activeLayer = isDark ? darkLayer : lightLayer;
  }
  activeLayer.addTo(map);
}
themeBtn.addEventListener('click', () => {
  isDark = !isDark;
  themeBtn.textContent = isDark ? '☀️' : '🌙';
  if (isDark) {
    document.documentElement.removeAttribute('data-theme');
    document.querySelector('meta[name="theme-color"]').content = '#1a1a2e';
  } else {
    document.documentElement.setAttribute('data-theme', 'light');
    document.querySelector('meta[name="theme-color"]').content = '#ffffff';
  }
  applyMapLayer();
});

// ── Satellite toggle ──
const satBtn = document.getElementById('satellite-btn');
satBtn.addEventListener('click', () => {
  isSatellite = !isSatellite;
  satBtn.classList.toggle('active', isSatellite);
  satBtn.textContent = isSatellite ? '🗺️' : '🛰️';
  applyMapLayer();
});

// ── Drop pin ──
function enableDropPin() {
  dropPinMode = true;
  map.getContainer().style.cursor = 'crosshair';
}

map.on('click', e => {
  if (!dropPinMode) return;
  dropPinMode = false;
  map.getContainer().style.cursor = '';
  const { lat, lng } = e.latlng;

  if (pinMarker) map.removeLayer(pinMarker);
  const pinIcon = L.divIcon({
    className: 'pin-marker',
    html: '📍',
    iconSize: [28, 28],
    iconAnchor: [14, 28],
  });
  pinMarker = L.marker([lat, lng], { icon: pinIcon, draggable: true }).addTo(map);
  pinMarker.bindPopup('Dropped pin — drag to move').openPopup();
  pinMarker.on('dragend', () => {
    const pos = pinMarker.getLatLng();
    setUserLocation(pos.lat, pos.lng);
  });

  setUserLocation(lat, lng);
});

// ── Panel toggle ──
document.getElementById('panel-header').addEventListener('click', () => {
  document.getElementById('panel').classList.toggle('collapsed');
  setTimeout(() => map.invalidateSize(), 350);
});

// ── Service worker ──
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('sw.js').catch(() => {});
}

// ── Init ──
loadData();
</script>
</body>
