<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#1a1a2e">
<title>Parking Gothenburg</title>
<link rel="manifest" href="manifest.json">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" crossorigin="">
<link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.css" crossorigin="">
<link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.Default.css" crossorigin="">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
:root {
  --bg: #1a1a2e;
  --surface: #16213e;
  --surface2: #0f3460;
  --accent: #e94560;
  --green: #00b894;
  --yellow: #fdcb6e;
  --red: #e17055;
  --text: #f0f0f0;
  --text-dim: #a0a0b0;
  --radius: 12px;
}
[data-theme="light"] {
  --bg: #f0f2f5;
  --surface: #ffffff;
  --surface2: #e4e6eb;
  --text: #1c1e21;
  --text-dim: #65676b;
}
[data-theme="light"] .leaflet-popup-content-wrapper { background: #fff !important; color: #1c1e21 !important; }
[data-theme="light"] .leaflet-popup-tip { background: #fff !important; }
[data-theme="light"] .marker-dot { border-color: #333; }
body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
  background: var(--bg);
  color: var(--text);
  height: 100dvh;
  display: flex;
  flex-direction: column;
  overflow: hidden;
}

/* Header */
#header {
  background: var(--surface);
  padding: 8px 12px;
  display: flex;
  align-items: center;
  gap: 8px;
  border-bottom: 1px solid rgba(255,255,255,0.08);
  z-index: 1000;
  flex-shrink: 0;
}
#header h1 { font-size: 16px; font-weight: 600; white-space: nowrap; }
#header .author { font-size: 10px; color: var(--text-dim); text-decoration: none; opacity: 0.6; }
#header .author:hover { opacity: 1; }
#header .stats { font-size: 11px; color: var(--text-dim); margin-left: auto; white-space: nowrap; }
#lang-btn, #theme-btn { flex-shrink: 0; background: none; border: none; font-size: 12px; cursor: pointer; padding: 4px 6px; line-height: 1; color: var(--text-dim); font-weight: 600; }
#lang-btn:hover { color: var(--text); }
#map-style-toggle { flex-shrink: 0; display: flex; gap: 2px; background: rgba(255,255,255,0.08); border-radius: 8px; padding: 2px; }
#map-style-toggle button { background: none; border: none; font-size: 11px; cursor: pointer; padding: 3px 6px; border-radius: 6px; color: var(--text-dim); line-height: 1; }
#map-style-toggle button.active { background: var(--surface2); color: var(--text); }
[data-theme="light"] #map-style-toggle { background: rgba(0,0,0,0.06); }
[data-theme="light"] #map-style-toggle button.active { background: #d0d2d6; }

/* Map */
#map {
  flex: 1;
  z-index: 1;
}

/* Bottom panel */
#panel {
  background: var(--surface);
  border-top: 1px solid rgba(255,255,255,0.08);
  max-height: 45dvh;
  display: flex;
  flex-direction: column;
  transition: max-height 0.3s ease;
  z-index: 1000;
  flex-shrink: 0;
}
#panel.collapsed { max-height: 44px; }
#panel-header {
  padding: 10px 12px;
  display: flex;
  align-items: center;
  gap: 8px;
  cursor: pointer;
  flex-shrink: 0;
}
#panel-header .handle {
  width: 36px; height: 4px;
  background: rgba(255,255,255,0.2);
  border-radius: 2px;
  margin: 0 auto;
}

/* Controls row */
#controls {
  padding: 0 12px 8px;
  display: flex;
  gap: 6px;
  flex-wrap: wrap;
  flex-shrink: 0;
}
.btn {
  background: var(--surface2);
  border: 1px solid rgba(255,255,255,0.1);
  color: var(--text);
  padding: 6px 12px;
  border-radius: 20px;
  font-size: 12px;
  cursor: pointer;
  white-space: nowrap;
  transition: all 0.15s;
}
.btn:active { transform: scale(0.95); }
.btn.active { background: var(--accent); border-color: var(--accent); }
.btn.locate { background: var(--green); border-color: var(--green); }
#sort-select {
  background: var(--surface2);
  border: 1px solid rgba(255,255,255,0.1);
  color: var(--text);
  padding: 6px 10px;
  border-radius: 20px;
  font-size: 12px;
}

/* Results list */
#results {
  overflow-y: auto;
  padding: 0 12px 12px;
  -webkit-overflow-scrolling: touch;
}
.result-card {
  background: var(--bg);
  border-radius: var(--radius);
  padding: 10px 12px;
  margin-bottom: 6px;
  display: flex;
  align-items: center;
  gap: 10px;
  cursor: pointer;
  transition: background 0.15s;
}
.result-card:active { background: var(--surface2); }
.result-card .price-badge {
  min-width: 52px;
  text-align: center;
  padding: 4px 8px;
  border-radius: 8px;
  font-weight: 700;
  font-size: 14px;
  flex-shrink: 0;
}
.price-cheap { background: rgba(0,184,148,0.2); color: var(--green); }
.price-mid { background: rgba(253,203,110,0.2); color: var(--yellow); }
.price-high { background: rgba(225,112,85,0.2); color: var(--red); }
.price-unknown { background: rgba(160,160,176,0.15); color: var(--text-dim); }
.result-card .info { flex: 1; min-width: 0; }
.result-card .name { font-size: 13px; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.result-card .meta { font-size: 11px; color: var(--text-dim); margin-top: 2px; }
.result-card .distance { font-size: 12px; color: var(--text-dim); white-space: nowrap; flex-shrink: 0; }
.source-dot {
  display: inline-block; width: 6px; height: 6px;
  border-radius: 50%; margin-right: 4px; vertical-align: middle;
}
.src-easypark { background: #ec5fa1; }
.src-parkster { background: #4daa5b; }
.src-parkering_gbg { background: #387aba; }

/* Source logo badges */
.src-logo {
  display: inline-block;
  font-size: 10px;
  font-weight: 700;
  padding: 1px 5px;
  border-radius: 4px;
  vertical-align: middle;
  letter-spacing: 0.3px;
  line-height: 14px;
}
.src-logo-easypark { background: #ec5fa1; color: #fff; }
.src-logo-parkster { background: #4daa5b; color: #fff; }
.src-logo-parkering_gbg { background: #387aba; color: #fff; }
.src-logo-epark { background: #00a89e; color: #fff; }

/* Autocomplete dropdown */
#autocomplete {
  position: absolute;
  background: var(--surface);
  border: 1px solid rgba(255,255,255,0.15);
  border-radius: 12px;
  max-height: 200px;
  overflow-y: auto;
  z-index: 2000;
  display: none;
  box-shadow: 0 4px 16px rgba(0,0,0,0.4);
  width: 260px;
}
#autocomplete.visible { display: block; }
.ac-item {
  padding: 8px 12px;
  cursor: pointer;
  font-size: 12px;
  border-bottom: 1px solid rgba(255,255,255,0.05);
}
.ac-item:hover, .ac-item:active { background: var(--surface2); }
.ac-item .ac-name { font-weight: 500; }
.ac-item .ac-sub { font-size: 10px; color: var(--text-dim); }

/* Google Maps link input */
#location-input {
  background: var(--bg);
  border: 1px solid rgba(255,255,255,0.1);
  color: var(--text);
  padding: 6px 10px;
  border-radius: 20px;
  font-size: 12px;
  width: 100%;
  max-width: 220px;
}
#location-input::placeholder { color: var(--text-dim); }

/* Loading overlay */
#loading {
  position: fixed; inset: 0;
  background: var(--bg);
  display: flex;
  align-items: center;
  justify-content: center;
  flex-direction: column;
  gap: 16px;
  z-index: 9999;
  transition: opacity 0.3s;
}
#loading.hidden { opacity: 0; pointer-events: none; }
.spinner {
  width: 40px; height: 40px;
  border: 3px solid rgba(255,255,255,0.1);
  border-top-color: var(--accent);
  border-radius: 50%;
  animation: spin 0.8s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }

/* Custom markers */
.price-marker {
  background: none;
  border: none;
}
.marker-dot {
  width: 12px; height: 12px;
  border-radius: 50%;
  border: 2px solid white;
  box-shadow: 0 1px 4px rgba(0,0,0,0.4);
}

/* Leaflet popup override */
.leaflet-popup-content-wrapper {
  background: var(--surface) !important;
  color: var(--text) !important;
  border-radius: var(--radius) !important;
  box-shadow: 0 4px 20px rgba(0,0,0,0.4) !important;
}
.leaflet-popup-tip { background: var(--surface) !important; }
.leaflet-popup-content { margin: 10px 14px !important; font-size: 13px; }
.leaflet-popup-content .popup-name { font-weight: 600; font-size: 14px; margin-bottom: 4px; }
.leaflet-popup-content .popup-price { color: var(--green); font-weight: 700; font-size: 16px; }
.leaflet-popup-content .popup-meta { color: var(--text-dim); font-size: 11px; margin-top: 4px; }
.leaflet-popup-content a { color: var(--accent); }

/* Cluster override */
.marker-cluster-small, .marker-cluster-medium, .marker-cluster-large {
  background: rgba(233,69,96,0.3) !important;
}
.marker-cluster-small div, .marker-cluster-medium div, .marker-cluster-large div {
  background: var(--accent) !important;
  color: white !important;
  font-weight: 600;
}

/* Radius slider row */
#radius-row {
  padding: 0 12px 6px;
  display: flex;
  align-items: center;
  gap: 8px;
  font-size: 11px;
  color: var(--text-dim);
  flex-shrink: 0;
}
#radius-slider {
  flex: 1;
  accent-color: var(--accent);
  height: 4px;
}
#radius-label { min-width: 44px; text-align: right; font-weight: 600; color: var(--text); }

/* Drop pin marker */
.pin-marker {
  font-size: 28px;
  line-height: 1;
  text-shadow: 0 2px 6px rgba(0,0,0,0.5);
  cursor: grab;
}

/* Radius circle */
.radius-circle {
  stroke: var(--accent);
  fill: var(--accent);
}

@media (min-width: 768px) {
  #panel { max-height: 35dvh; }
  #location-input { max-width: 300px; }
}
</style>
</head>
<body>

<div id="loading">
  <div class="spinner"></div>
  <div>Loading parking data...</div>
</div>

<div id="header">
  <h1>🅿️ Parking GBG</h1>
  <a class="author" href="https://github.com/abhineetst18" target="_blank" rel="noopener">by Abhineet</a>
  <span id="stats" class="stats"></span>
  <button id="lang-btn" title="Toggle language">SV→EN</button>
  <div id="map-style-toggle">
    <button data-style="dark" class="active" title="Dark map">🌙</button>
    <button data-style="light" title="Light map">☀️</button>
    <button data-style="satellite" title="Satellite">🛰️</button>
  </div>
</div>

<div id="map"></div>

<div id="panel">
  <div id="panel-header"><div class="handle"></div></div>
  <div id="controls">
    <button class="btn locate" onclick="locateMe()">📍 My Location</button>
    <div style="position:relative">
      <input id="location-input" type="text" placeholder="Search address or place..." autocomplete="off">
      <div id="autocomplete"></div>
    </div>
    <select id="sort-select">
      <option value="distance">Nearest</option>
      <option value="price">Cheapest</option>
    </select>
    <button class="btn" onclick="enableDropPin()" title="Drop a pin on the map">📌 Drop Pin</button>
    <button class="btn filter-btn" data-source="all" onclick="toggleSource(this)">All</button>
    <button class="btn filter-btn active" data-source="easypark" onclick="toggleSource(this)">EP</button>
    <button class="btn filter-btn active" data-source="parkster" onclick="toggleSource(this)">Parkster</button>
    <button class="btn filter-btn active" data-source="parkering_gbg" onclick="toggleSource(this)">GBG</button>
    <button class="btn filter-btn active" data-source="epark" onclick="toggleSource(this)">ePARK</button>
    <button class="btn filter-btn active" data-type="street" onclick="toggleType(this)">Street</button>
    <button class="btn filter-btn active" data-type="garage" onclick="toggleType(this)">Garage</button>
    <button class="btn filter-btn active" data-type="lot" onclick="toggleType(this)">Lot</button>
    <button class="btn filter-btn active" data-type="ev" onclick="toggleType(this)">EV</button>
    <button class="btn filter-btn active" data-type="other" onclick="toggleType(this)">Other</button>
  </div>
  <div id="radius-row">
    <span>Radius:</span>
    <input id="radius-slider" type="range" min="200" max="10000" step="100" value="3000">
    <span id="radius-label">3.0 km</span>
  </div>
  <div id="results"></div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" crossorigin=""></script>
<script src="https://unpkg.com/leaflet.markercluster@1.5.3/dist/leaflet.markercluster.js" crossorigin=""></script>
<script>
'use strict';

// ── State ──
let allSpots = [];
let userLat = null, userLon = null;
let map, userMarker, clusterGroup;
let activeSources = new Set(['easypark', 'parkster', 'parkering_gbg', 'epark']);
let activeTypes = new Set(['street', 'garage', 'lot', 'ev', 'other']);
let sortMode = 'distance';
let searchRadius = 3000; // metres, adjustable
let lang = 'sv'; // 'sv' or 'en'

// ── Platform detection ──
const _isIOS = /iPad|iPhone|iPod/.test(navigator.userAgent);
const _isAndroid = /Android/.test(navigator.userAgent);
const _isMobile = _isIOS || _isAndroid;

// ── Swedish → English translation ──
const SV_EN = [
  // Time expressions (order matters - longer patterns first)
  [/\balla dagar\b/gi, 'all days'],
  [/\bhelgfri\b/gi, 'non-holiday'],
  [/\bmån-fre\b/gi, 'Mon-Fri'],
  [/\bmån\b/gi, 'Mon'], [/\btis\b/gi, 'Tue'], [/\bons\b/gi, 'Wed'],
  [/\btor\b/gi, 'Thu'], [/\bfre\b/gi, 'Fri'], [/\blör\b/gi, 'Sat'], [/\bsön\b/gi, 'Sun'],
  [/\blör-sön\b/gi, 'Sat-Sun'],
  [/\bmåndagar\b/gi, 'Mondays'], [/\btisdagar\b/gi, 'Tuesdays'],
  [/\bonsdagar\b/gi, 'Wednesdays'], [/\btorsdagar\b/gi, 'Thursdays'],
  [/\bfredagar\b/gi, 'Fridays'], [/\blördagar\b/gi, 'Saturdays'],
  [/\bsöndagar\b/gi, 'Sundays'],
  [/\bklockan\b/gi, ''],
  [/\bövrig tid\b/gi, 'other times'],
  // Pricing
  [/\bkr\/tim\b/gi, 'SEK/hr'], [/\bkr\/timme\b/gi, 'SEK/hr'], [/\bkr\/h\b/gi, 'SEK/hr'],
  [/\bkr\/dygn\b/gi, 'SEK/24h'], [/\bkr\/dag\b/gi, 'SEK/day'],
  [/\bkr\s+per\s+påbörjad\w*\s+timme\b/gi, 'SEK/started hr'],
  [/\bkr\s*\/?\s*per\s+påbörjad\w*\b/gi, 'SEK/started'],
  [/\bmaxtaxa\b/gi, 'max rate'],
  [/\bgratis\b/gi, 'Free'],
  [/\bavgiftsfri\b/gi, 'free of charge'],
  // Parking terms
  [/\bP-förbud\b/gi, 'No parking'],
  [/\bp-tillstånd\s+erfordras\b/gi, 'permit required'],
  [/\btillstånd\b/gi, 'permit'],
  [/\bpåbörjad\w*\b/gi, 'started'],
  [/\btidsbegräns\w*/gi, 'time-limited'],
  [/\bserviceavgift\s+kan\s+tillkomma\b/gi, 'service fee may apply'],
  [/\bladdplats\b/gi, 'charging station'],
  [/\blåst\s+garage\b/gi, 'locked garage'],
  [/\bendast\s+för\b/gi, 'only for'],
  [/\bhyresgäst\w*\b/gi, 'tenants'],
  [/\bboende\b/gi, 'residents'],
  [/\banställd\w*\b/gi, 'employees'],
  [/\bparkering\w*\b/gi, 'parking'],
  // Units
  [/\btim(?:mar|me)?\b/gi, 'hr'],
  [/\bmin\b/gi, 'min'],
  [/\bdygn\b/gi, '24h'],
];

function translateSv(text) {
  if (!text || lang === 'sv') return text;
  let t = text;
  for (const [pattern, replacement] of SV_EN) {
    t = t.replace(pattern, replacement);
  }
  // Clean up double spaces
  return t.replace(/\s{2,}/g, ' ').trim();
}
let radiusCircle = null;
let pinMarker = null;
let dropPinMode = false;
let currentTheme = 'dark'; // 'dark', 'light', 'satellite'

// ── Map init ──
map = L.map('map', {
  center: [57.7089, 11.9746],
  zoom: 14,
  zoomControl: false,
  attributionControl: false,
});
L.control.zoom({ position: 'topright' }).addTo(map);
L.control.attribution({ position: 'bottomright', prefix: false })
  .addAttribution('© <a href="https://www.openstreetmap.org/copyright">OSM</a>')
  .addTo(map);

// Tile layers
const darkLayer = L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
  maxZoom: 19,
  subdomains: 'abcd',
});
const lightLayer = L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png', {
  maxZoom: 19,
  subdomains: 'abcd',
});
const satelliteLayer = L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}', {
  maxZoom: 19,
});
let activeLayer = darkLayer;
darkLayer.addTo(map);

clusterGroup = L.markerClusterGroup({
  maxClusterRadius: 40,
  spiderfyOnMaxZoom: true,
  showCoverageOnHover: false,
  disableClusteringAtZoom: 17,
});
map.addLayer(clusterGroup);

// ── Price color logic ──
function priceColor(price) {
  if (price == null) return '#a0a0b0';
  if (price <= 10) return '#00b894';
  if (price <= 20) return '#fdcb6e';
  return '#e17055';
}
function priceClass(price) {
  if (price == null) return 'price-unknown';
  if (price <= 10) return 'price-cheap';
  if (price <= 20) return 'price-mid';
  return 'price-high';
}

// ── Source labels ──
const SRC_LABELS = {
  easypark: 'EasyPark',
  parkster: 'Parkster',
  parkering_gbg: 'P.GBG',
  epark: 'ePARK',
};
function srcLogo(source) {
  const label = SRC_LABELS[source] || source;
  return `<span class=\"src-logo src-logo-${source}\">${label}</span>`;
}

// ── Haversine ──
function haversine(lat1, lon1, lat2, lon2) {
  const R = 6371000;
  const dLat = (lat2 - lat1) * Math.PI / 180;
  const dLon = (lon2 - lon1) * Math.PI / 180;
  const a = Math.sin(dLat/2)**2 + Math.cos(lat1*Math.PI/180) * Math.cos(lat2*Math.PI/180) * Math.sin(dLon/2)**2;
  return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
}

function formatDist(m) {
  if (m < 1000) return `${Math.round(m)} m`;
  return `${(m/1000).toFixed(1)} km`;
}

// ── Create marker ──
function makeMarker(spot) {
  const color = priceColor(spot.price_sek_hr);
  const icon = L.divIcon({
    className: 'price-marker',
    html: `<div class="marker-dot" style="background:${color}"></div>`,
    iconSize: [12, 12],
    iconAnchor: [6, 6],
  });
  const marker = L.marker([spot.lat, spot.lon], { icon });

  let priceStr;
  if (spot.price_sek_hr != null) {
    priceStr = `${spot.price_sek_hr} SEK/hr`;
  } else if (spot.time_limited_free) {
    priceStr = '🆓 Time-limited free';
  } else if (spot.price_text?.includes('Gratis')) {
    priceStr = 'Free';
  } else {
    priceStr = 'Price unknown';
  }
  const limitStr = spot.time_limit ? `<br>⏱ Max ${spot.time_limit}` : (spot.time_limited_free ? '<br>⏱ Check sign for time limit' : '');
  const maxDailyStr = spot.max_daily_sek ? ` · Max ${spot.max_daily_sek} SEK/day` : '';
  const distStr = spot._dist != null ? `<br>${formatDist(spot._dist)} away` : '';
  const navUrl = `https://www.google.com/maps/dir/?api=1&destination=${spot.lat},${spot.lon}&travelmode=walking`;
  const svUrl = `https://www.google.com/maps/@?api=1&map_action=pano&viewpoint=${spot.lat},${spot.lon}`;
  const codes = spot.area_codes || {};
  let codeHtml = '';
  const codeEntries = Object.entries(codes);
  if (codeEntries.length) {
    codeHtml = `<div class="popup-code" style="margin:4px 0;font-size:12px;color:var(--text-dim)">`;
    for (const [src, code] of codeEntries) {
      const label = SRC_LABELS[src] || src;
      codeHtml += `${label}: <strong style="color:var(--text);font-size:14px;letter-spacing:1px">${escHtml(code)}</strong> <button onclick="copyCode('${escHtml(code)}')" style="background:var(--surface2);border:1px solid rgba(255,255,255,0.15);color:var(--text);padding:2px 8px;border-radius:10px;font-size:11px;cursor:pointer;margin-left:4px">📋 Copy</button><br>`;
    }
    codeHtml += `</div>`;
  }
  const appLinks = buildAppLinks(spot);
  const srcLogos = (spot.sources || []).map(srcLogo).join(' ');

  marker.bindPopup(`
    <div class="popup-name">${escHtml(spot.name)}</div>
    <div class="popup-price">${priceStr}${maxDailyStr}</div>
    ${codeHtml}
    <div class="popup-meta">
      ${srcLogos} ${spot.type}${limitStr}<br>
      ${escHtml(translateSv(spot.price_text))}${distStr}<br>
      <a href="${navUrl}" target="_blank" rel="noopener">Navigate here →</a>
      · <a href="${svUrl}" target="_blank" rel="noopener">Street View 👁</a>
      ${appLinks}
    </div>
  `, { maxWidth: 280 });

  marker._spotId = spot.id;
  return marker;
}

function copyCode(code) {
  navigator.clipboard.writeText(code).then(() => {
    // Brief visual feedback
    const btns = document.querySelectorAll('.popup-code button');
    btns.forEach(b => { b.textContent = '✓ Copied'; setTimeout(() => b.textContent = '📋 Copy', 1500); });
  }).catch(() => {
    // Fallback for older browsers
    const ta = document.createElement('textarea');
    ta.value = code; ta.style.position = 'fixed'; ta.style.opacity = '0';
    document.body.appendChild(ta); ta.select(); document.execCommand('copy');
    document.body.removeChild(ta);
  });
}

function buildAppLinks(spot) {
  if (!_isMobile) return '';
  const codes = spot.area_codes || {};
  const links = [];
  // EasyPark deep link
  const epCode = codes.easypark || (!codes.parkster && !codes.easypark ? codes.parkering_gbg : null);
  if (epCode) {
    links.push(`<a href="easypark://area/${epCode}" style="color:var(--accent)">Open EasyPark</a>`);
  }
  // Parkster deep link
  const pkCode = codes.parkster || (!codes.parkster && !codes.easypark ? codes.parkering_gbg : null);
  if (pkCode) {
    links.push(`<a href="parkster://zone/${pkCode}" style="color:var(--accent)">Open Parkster</a>`);
  }
  // P.GBG app (no deep link scheme — link to store)
  if (codes.parkering_gbg) {
    const storeUrl = _isIOS
      ? 'https://apps.apple.com/se/app/parkering-g%C3%B6teborg/id1184264972'
      : 'https://play.google.com/store/apps/details?id=se.goteborg.pbolaget.android';
    links.push(`<a href="${storeUrl}" target="_blank" rel="noopener" style="color:var(--accent)">Open P.GBG</a>`);
  }
  // ePARK app (link to store)
  if (codes.epark) {
    const storeUrl = _isIOS
      ? 'https://apps.apple.com/se/app/epark/id500644505'
      : 'https://play.google.com/store/apps/details?id=se.netix.eparkera';
    links.push(`<a href="${storeUrl}" target="_blank" rel="noopener" style="color:var(--accent)">Open ePARK</a>`);
  }
  if (!links.length) return '';
  return '<br>' + links.join(' · ');
}

function escHtml(s) {
  const d = document.createElement('div');
  d.textContent = s || '';
  return d.innerHTML;
}

// ── Load data ──
async function loadData() {
  try {
    const resp = await fetch('parking_data.json');
    const data = await resp.json();
    allSpots = data.spots || [];
    document.getElementById('stats').textContent =
      `${allSpots.length} spots · ${data.generated?.slice(0,10) || ''}`;
    refreshMap();
    document.getElementById('loading').classList.add('hidden');
  } catch (e) {
    document.getElementById('loading').innerHTML =
      `<div style="color:var(--accent)">Failed to load data</div><div style="font-size:12px;color:var(--text-dim)">${e.message}</div>`;
  }
}

// ── Refresh map + list ──
function refreshMap() {
  const filtered = allSpots.filter(s =>
    (s.sources || []).some(src => activeSources.has(src)) && activeTypes.has(s.type)
  );

  // Compute distances
  if (userLat != null) {
    filtered.forEach(s => {
      s._dist = haversine(userLat, userLon, s.lat, s.lon);
    });
  } else {
    filtered.forEach(s => { s._dist = null; });
  }

  // Filter by radius when user location is set
  let inRadius = filtered;
  if (userLat != null) {
    inRadius = filtered.filter(s => s._dist != null && s._dist <= searchRadius);
  }

  let sorted;
  if (sortMode === 'price') {
    sorted = [...inRadius].sort((a, b) => {
      const pa = a.price_sek_hr ?? 99999;
      const pb = b.price_sek_hr ?? 99999;
      if (pa !== pb) return pa - pb;
      return (a._dist ?? 99999) - (b._dist ?? 99999);
    });
  } else {
    if (userLat != null) {
      sorted = [...inRadius].sort((a, b) => (a._dist ?? 99999) - (b._dist ?? 99999));
    } else {
      sorted = [...filtered].sort((a, b) => (a.price_sek_hr ?? 99999) - (b.price_sek_hr ?? 99999));
    }
  }

  // Update map markers
  clusterGroup.clearLayers();
  const markers = sorted.slice(0, 2000).map(makeMarker);
  clusterGroup.addLayers(markers);

  // Update results list (top 100)
  const resultsEl = document.getElementById('results');
  const top = sorted.slice(0, 100);
  resultsEl.innerHTML = top.map(s => {
    let priceStr;
    if (s.price_sek_hr != null) { priceStr = `${s.price_sek_hr}`; }
    else if (s.time_limited_free) { priceStr = '🆓'; }
    else if (s.price_text?.includes('Gratis')) { priceStr = 'Free'; }
    else { priceStr = '?'; }
    const priceUnit = s.time_limited_free ? '<span style="font-size:9px;font-weight:400">free</span>' : '<span style="font-size:9px;font-weight:400">kr/h</span>';
    const distStr = s._dist != null ? formatDist(s._dist) : '';
    let limitBadge = s.time_limit ? `<span style="color:var(--yellow);font-size:10px"> ⏱${s.time_limit}</span>` : '';
    if (!limitBadge && s.time_limited_free) limitBadge = '<span style="color:var(--yellow);font-size:10px"> ⏱ check sign</span>';
    const codes = s.area_codes || {};
    const firstCode = Object.values(codes)[0] || '';
    const codeBadge = firstCode ? `<span style="color:var(--text-dim);font-size:10px;font-family:monospace"> #${escHtml(firstCode)}</span>` : '';
    const srcLogos = (s.sources || []).map(srcLogo).join(' ');
    return `
      <div class="result-card" onclick="flyTo(${s.lat},${s.lon},'${s.id}')">
        <div class="price-badge ${priceClass(s.price_sek_hr)}">${priceStr}<br>${priceUnit}</div>
        <div class="info">
          <div class="name">${escHtml(s.name)}${limitBadge}${codeBadge}</div>
          <div class="meta">${srcLogos} ${s.type}${s.price_text ? ' · '+escHtml(translateSv(s.price_text)) : ''}</div>
        </div>
        <div class="distance">${distStr}</div>
      </div>
    `;
  }).join('');
}

function flyTo(lat, lon, id) {
  map.flyTo([lat, lon], 17, { duration: 0.5 });
  // Open popup
  clusterGroup.eachLayer(layer => {
    if (layer._spotId === id) {
      setTimeout(() => layer.openPopup(), 600);
    }
  });
}

// ── Location ──
function locateMe() {
  if (!navigator.geolocation) return alert('Geolocation not supported');
  navigator.geolocation.getCurrentPosition(pos => {
    setUserLocation(pos.coords.latitude, pos.coords.longitude);
  }, err => {
    alert('Could not get location: ' + err.message);
  }, { enableHighAccuracy: true, timeout: 10000 });
}

function setUserLocation(lat, lon) {
  userLat = lat;
  userLon = lon;
  if (userMarker) map.removeLayer(userMarker);
  userMarker = L.circleMarker([lat, lon], {
    radius: 8, fillColor: '#e94560', fillOpacity: 1,
    color: 'white', weight: 3,
  }).addTo(map);
  userMarker.bindPopup('You are here').openPopup();
  map.flyTo([lat, lon], 16, { duration: 0.8 });
  updateRadiusCircle();
  refreshMap();
}

// ── Google Maps link parser ──
function parseGoogleMapsUrl(text) {
  // Formats: @57.7089,11.9746 or ?q=57.7089,11.9746 or /place/57.7089,11.9746
  let m = text.match(/@(-?\d+\.\d+),(-?\d+\.\d+)/);
  if (m) return [parseFloat(m[1]), parseFloat(m[2])];
  m = text.match(/[?&]q=(-?\d+\.\d+),(-?\d+\.\d+)/);
  if (m) return [parseFloat(m[1]), parseFloat(m[2])];
  m = text.match(/place\/(-?\d+\.\d+),(-?\d+\.\d+)/);
  if (m) return [parseFloat(m[1]), parseFloat(m[2])];
  // Short link resolves, try plain coords
  m = text.match(/(-?\d+\.\d{3,}),\s*(-?\d+\.\d{3,})/);
  if (m) return [parseFloat(m[1]), parseFloat(m[2])];
  return null;
}

// ── Nominatim geocoding ──
async function geocodeAddress(query) {
  const input = document.getElementById('location-input');
  input.style.borderColor = 'var(--yellow)';
  input.placeholder = 'Searching...';
  try {
    const url = `https://nominatim.openstreetmap.org/search?format=json&q=${encodeURIComponent(query)}&viewbox=11.7,57.6,12.2,57.85&bounded=1&limit=1`;
    const resp = await fetch(url, { headers: { 'Accept-Language': 'en' } });
    const results = await resp.json();
    if (results.length > 0) {
      const r = results[0];
      setUserLocation(parseFloat(r.lat), parseFloat(r.lon));
      input.value = '';
      input.blur();
      return true;
    }
    // Retry without bounding box
    const url2 = `https://nominatim.openstreetmap.org/search?format=json&q=${encodeURIComponent(query + ', Gothenburg')}&limit=1`;
    const resp2 = await fetch(url2, { headers: { 'Accept-Language': 'en' } });
    const results2 = await resp2.json();
    if (results2.length > 0) {
      const r = results2[0];
      setUserLocation(parseFloat(r.lat), parseFloat(r.lon));
      input.value = '';
      input.blur();
      return true;
    }
    return false;
  } catch (e) {
    console.error('Geocoding failed:', e);
    return false;
  } finally {
    input.style.borderColor = '';
    input.placeholder = 'Search address or place...';
  }
}

// ── Autocomplete ──
let acTimer = null;
const acEl = document.getElementById('autocomplete');

function hideAutocomplete() { acEl.classList.remove('visible'); acEl.innerHTML = ''; }

async function fetchSuggestions(q) {
  // Widen viewbox to include Mölndal, Partille, Kungälv area
  const url = `https://nominatim.openstreetmap.org/search?format=json&q=${encodeURIComponent(q)}&viewbox=11.6,57.55,12.3,57.9&bounded=0&limit=5&addressdetails=1`;
  const resp = await fetch(url, { headers: { 'Accept-Language': 'en' } });
  return resp.json();
}

function showSuggestions(results) {
  if (!results.length) { hideAutocomplete(); return; }
  acEl.innerHTML = results.map((r, i) => {
    const parts = r.display_name.split(',');
    const name = parts[0].trim();
    const sub = parts.slice(1, 3).map(s => s.trim()).join(', ');
    return `<div class="ac-item" data-idx="${i}"><div class="ac-name">${escHtml(name)}</div><div class="ac-sub">${escHtml(sub)}</div></div>`;
  }).join('');
  acEl.classList.add('visible');
  acEl.querySelectorAll('.ac-item').forEach((el, i) => {
    el.addEventListener('click', () => {
      const r = results[i];
      setUserLocation(parseFloat(r.lat), parseFloat(r.lon));
      document.getElementById('location-input').value = results[i].display_name.split(',')[0].trim();
      hideAutocomplete();
    });
  });
}

document.getElementById('location-input').addEventListener('input', e => {
  const val = e.target.value.trim();
  clearTimeout(acTimer);
  if (val.length < 3) { hideAutocomplete(); return; }
  // Don't autocomplete coords or URLs
  if (/^\d+\.\d+/.test(val) || /^https?:\/\//.test(val)) { hideAutocomplete(); return; }
  acTimer = setTimeout(async () => {
    try {
      const results = await fetchSuggestions(val);
      showSuggestions(results);
    } catch { hideAutocomplete(); }
  }, 350);
});

// Hide on blur (small delay so click events fire first)
document.getElementById('location-input').addEventListener('blur', () => {
  setTimeout(hideAutocomplete, 200);
});

function isShortGoogleLink(text) {
  return /^https?:\/\/(maps\.app\.goo\.gl|goo\.gl)\//i.test(text.trim());
}

document.getElementById('location-input').addEventListener('keydown', async e => {
  if (e.key === 'Enter') {
    hideAutocomplete();
    const val = e.target.value.trim();
    if (!val) return;

    // 1. Try parsing as coords / Google Maps URL
    const coords = parseGoogleMapsUrl(val);
    if (coords) {
      setUserLocation(coords[0], coords[1]);
      e.target.value = '';
      e.target.blur();
      return;
    }

    // 2. Short Google links can't be resolved client-side
    if (isShortGoogleLink(val)) {
      alert('Short Google Maps links (goo.gl) cannot be resolved in the browser.\n\nInstead:\n1. Open the link in Google Maps\n2. Copy the full URL (with @lat,lng)\n3. Or just type the place name here');
      return;
    }

    // 3. Try geocoding as address/place name
    const found = await geocodeAddress(val);
    if (!found) {
      e.target.style.borderColor = 'var(--red)';
      setTimeout(() => e.target.style.borderColor = '', 1500);
    }
  }
});

// ── Filters ──
function toggleSource(btn) {
  const src = btn.dataset.source;
  if (src === 'all') {
    const allActive = activeSources.size >= 4;
    document.querySelectorAll('.filter-btn[data-source]').forEach(b => {
      if (b.dataset.source !== 'all') {
        b.classList.toggle('active', !allActive);
        if (allActive) activeSources.delete(b.dataset.source);
        else activeSources.add(b.dataset.source);
      }
    });
  } else {
    btn.classList.toggle('active');
    if (btn.classList.contains('active')) activeSources.add(src);
    else activeSources.delete(src);
  }
  refreshMap();
}

function toggleType(btn) {
  const type = btn.dataset.type;
  btn.classList.toggle('active');
  if (btn.classList.contains('active')) activeTypes.add(type);
  else activeTypes.delete(type);
  refreshMap();
}

document.getElementById('sort-select').addEventListener('change', e => {
  sortMode = e.target.value;
  updateRadiusCircle();
  refreshMap();
});

// ── Radius slider ──
let _radiusTimer = null;
document.getElementById('radius-slider').addEventListener('input', e => {
  searchRadius = parseInt(e.target.value);
  const label = searchRadius >= 1000 ? `${(searchRadius/1000).toFixed(1)} km` : `${searchRadius} m`;
  document.getElementById('radius-label').textContent = label;
  updateRadiusCircle();
  clearTimeout(_radiusTimer);
  _radiusTimer = setTimeout(refreshMap, 80);
});

function updateRadiusCircle() {
  if (radiusCircle) { map.removeLayer(radiusCircle); radiusCircle = null; }
  if (userLat != null) {
    radiusCircle = L.circle([userLat, userLon], {
      radius: searchRadius,
      color: '#e94560',
      fillColor: '#e94560',
      fillOpacity: 0.06,
      weight: 1,
      dashArray: '6,4',
    }).addTo(map);
  }
}

// ── Language toggle ──
const langBtn = document.getElementById('lang-btn');
langBtn.addEventListener('click', () => {
  lang = lang === 'sv' ? 'en' : 'sv';
  langBtn.textContent = lang === 'sv' ? 'SV→EN' : 'EN→SV';
  refreshMap();
});

// ── Map style toggle (dark / light / satellite) ──
const styleBtns = document.querySelectorAll('#map-style-toggle button');
function setMapStyle(style) {
  map.removeLayer(activeLayer);
  styleBtns.forEach(b => b.classList.toggle('active', b.dataset.style === style));
  if (style === 'light') {
    currentTheme = 'light';
    activeLayer = lightLayer;
    document.documentElement.setAttribute('data-theme', 'light');
    document.querySelector('meta[name="theme-color"]').content = '#ffffff';
  } else if (style === 'satellite') {
    currentTheme = 'satellite';
    activeLayer = satelliteLayer;
    document.documentElement.removeAttribute('data-theme');
    document.querySelector('meta[name="theme-color"]').content = '#1a1a2e';
  } else {
    currentTheme = 'dark';
    activeLayer = darkLayer;
    document.documentElement.removeAttribute('data-theme');
    document.querySelector('meta[name="theme-color"]').content = '#1a1a2e';
  }
  activeLayer.addTo(map);
}
styleBtns.forEach(btn => btn.addEventListener('click', () => setMapStyle(btn.dataset.style)));

// ── Drop pin ──
function enableDropPin() {
  dropPinMode = true;
  map.getContainer().style.cursor = 'crosshair';
}

map.on('click', e => {
  if (!dropPinMode) return;
  dropPinMode = false;
  map.getContainer().style.cursor = '';
  const { lat, lng } = e.latlng;

  if (pinMarker) map.removeLayer(pinMarker);
  const pinIcon = L.divIcon({
    className: 'pin-marker',
    html: '📍',
    iconSize: [28, 28],
    iconAnchor: [14, 28],
  });
  pinMarker = L.marker([lat, lng], { icon: pinIcon, draggable: true }).addTo(map);
  pinMarker.bindPopup('Dropped pin — drag to move').openPopup();
  pinMarker.on('dragend', () => {
    const pos = pinMarker.getLatLng();
    setUserLocation(pos.lat, pos.lng);
  });

  setUserLocation(lat, lng);
});

// ── Panel toggle ──
document.getElementById('panel-header').addEventListener('click', () => {
  document.getElementById('panel').classList.toggle('collapsed');
  setTimeout(() => map.invalidateSize(), 350);
});

// ── Service worker ──
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('sw.js').catch(() => {});
}

// ── Init ──
loadData();
</script>
